# config.yaml
experiment_name: "SOM_RGB_Training"

data:
  path: "data/input_data.npy"
  # Optional preprocessing parameters
  normalize: true
  split_ratio: 0.8  # Optional train/validation split

model:
  width: 24
  height: 24
  input_dim: 3  # For RGB data
  alpha0: 0.1
  sigma0: null  # null means use default (max(width, height)/2)

training:
  n_iterations: 100
  # batch_size: 5
  evaluation_interval: 20

output:
  base_dir: "outputs"
  save_checkpoints: true
  checkpoint_interval: 1000
